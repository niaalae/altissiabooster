name: Run Website Opener Every 30 Minutes

on:
  push:
    branches: [ main, master ]
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  run-website-opener:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable
        google-chrome --version
    
    - name: Install dependencies
      run: |
        npm install puppeteer puppeteer-extra puppeteer-extra-plugin-stealth
    
    - name: Run website opener script
      run: |
        node open_websites.js
      timeout-minutes: 360
