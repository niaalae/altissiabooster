name: Run Website Opener Every 30 Minutes

on:
  push:
    branches: [ main, master ]
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  run-website-opener:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Run website opener script
      run: |
        node open_websites.js
